<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PRIME CASINO | NFT</title>
    <!-- TON Connect Library -->
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        /* Черная премиальная тема */
        :root {
            --bg-primary: #0a0a0a;
            --bg-secondary: #111111;
            --bg-card: rgba(20, 20, 20, 0.95);
            --bg-card-hover: #1a1a1a;
            --text-primary: #ffffff;
            --text-secondary: #888888;
            --accent-gold: #D4AF37;
            --accent-gold-light: #F5D742;
            --accent-gold-dark: #B8860B;
            --accent-gold-glow: rgba(212, 175, 55, 0.15);
            --border-color: rgba(212, 175, 55, 0.2);
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            --shadow-gold: 0 0 30px var(--accent-gold-glow);
            --gradient-gold: linear-gradient(135deg, var(--accent-gold) 0%, var(--accent-gold-dark) 100%);
            --ton-blue: #0088CC;
        }

        body {
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        /* Фоновый паттерн */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(212, 175, 55, 0.03) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(212, 175, 55, 0.03) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        .app-container {
            max-width: 450px;
            margin: 0 auto;
            padding: 20px 16px;
            position: relative;
            z-index: 1;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Хедер */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 20px;
            background: rgba(10, 10, 10, 0.8);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            border: 1px solid var(--border-color);
            margin-bottom: 24px;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .user-avatar {
            width: 48px;
            height: 48px;
            border-radius: 24px;
            background: linear-gradient(135deg, #333, #222);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: 500;
            color: var(--accent-gold);
            border: 2px solid var(--accent-gold);
            text-transform: uppercase;
        }

        .user-name {
            font-weight: 600;
            font-size: 16px;
            letter-spacing: -0.02em;
        }

        .user-handle {
            font-size: 14px;
            color: var(--text-secondary);
            margin-top: 2px;
        }

        /* Баланс */
        .balance-container {
            display: flex;
            gap: 12px;
        }

        .balance-item {
            background: var(--bg-card);
            padding: 8px 16px;
            border-radius: 40px;
            border: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 6px;
            font-weight: 600;
            font-size: 14px;
        }

        .balance-gold {
            color: var(--accent-gold);
        }

        /* Основной контент */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        /* Секция TON кошелька */
        .wallet-section {
            background: var(--bg-card);
            border-radius: 20px;
            padding: 24px;
            border: 1px solid var(--border-color);
            backdrop-filter: blur(10px);
        }

        .wallet-title {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
        }

        .wallet-icon {
            width: 40px;
            height: 40px;
            background: var(--gradient-gold);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            color: #000;
        }

        .wallet-info {
            flex: 1;
        }

        .wallet-label {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 4px;
        }

        .wallet-value {
            font-size: 20px;
            font-weight: 700;
            color: var(--accent-gold);
        }

        .wallet-value small {
            font-size: 14px;
            color: var(--text-secondary);
            font-weight: 400;
            margin-left: 4px;
        }

        .wallet-address {
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 12px 16px;
            margin: 16px 0;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .address-text {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            max-width: 200px;
        }

        .copy-button {
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .copy-button:hover {
            border-color: var(--accent-gold);
            color: var(--accent-gold);
        }

        .wallet-actions {
            display: flex;
            gap: 12px;
            margin-top: 16px;
        }

        .wallet-button {
            flex: 1;
            padding: 14px;
            border: 2px solid var(--accent-gold);
            border-radius: 12px;
            background: transparent;
            color: var(--accent-gold);
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 0.5px;
        }

        .wallet-button.primary {
            background: var(--gradient-gold);
            color: #000;
            border: none;
        }

        .wallet-button:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-gold);
        }

        .wallet-button.primary:hover {
            background: linear-gradient(135deg, var(--accent-gold-light), var(--accent-gold));
        }

        /* Секция кейсов */
        .section-title {
            font-size: 18px;
            font-weight: 600;
            letter-spacing: 0.5px;
            margin-bottom: 16px;
            color: var(--text-primary);
            text-transform: uppercase;
            border-left: 4px solid var(--accent-gold);
            padding-left: 12px;
        }

        .cases-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 24px;
        }

        .case-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 20px 12px;
            text-align: center;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .case-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(212, 175, 55, 0.1), transparent);
            transition: left 0.6s ease;
        }

        .case-card:hover::before {
            left: 100%;
        }

        .case-card:hover {
            transform: translateY(-8px);
            border-color: var(--accent-gold);
            box-shadow: var(--shadow-gold);
        }

        .case-image {
            width: 80px;
            height: 80px;
            margin: 0 auto 16px;
            background: linear-gradient(135deg, #222, #1a1a1a);
            border-radius: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            color: var(--accent-gold);
            border: 2px solid var(--border-color);
        }

        .case-name {
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .case-price {
            color: var(--accent-gold);
            font-weight: 700;
            font-size: 16px;
            margin-bottom: 12px;
        }

        .case-button {
            width: 100%;
            padding: 10px;
            background: transparent;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .case-card:hover .case-button {
            border-color: var(--accent-gold);
            color: var(--accent-gold);
        }

        /* Нижняя навигация */
        .bottom-nav {
            background: rgba(10, 10, 10, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border-color);
            border-radius: 40px;
            padding: 8px;
            display: flex;
            justify-content: space-around;
            margin-top: auto;
        }

        .nav-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 12px 0;
            color: var(--text-secondary);
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            border-radius: 32px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .nav-item.active {
            color: var(--accent-gold);
            background: rgba(212, 175, 55, 0.1);
        }

        .nav-icon {
            font-size: 20px;
            margin-bottom: 4px;
        }

        /* Профиль */
        .profile-section {
            background: var(--bg-card);
            border-radius: 20px;
            padding: 24px;
            border: 1px solid var(--border-color);
        }

        .profile-header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 24px;
        }

        .profile-avatar-large {
            width: 72px;
            height: 72px;
            border-radius: 36px;
            background: linear-gradient(135deg, #333, #222);
            border: 3px solid var(--accent-gold);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: 600;
            color: var(--accent-gold);
        }

        .profile-stats {
            flex: 1;
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            padding: 8px 0;
            border-bottom: 1px solid var(--border-color);
        }

        .stat-label {
            color: var(--text-secondary);
            font-size: 14px;
        }

        .stat-value {
            font-weight: 600;
            color: var(--accent-gold);
        }

        /* Рефералы */
        .referral-section {
            background: var(--bg-card);
            border-radius: 20px;
            padding: 24px;
            border: 1px solid var(--border-color);
        }

        .referral-link-box {
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 16px;
            margin: 16px 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .referral-link {
            font-family: 'Courier New', monospace;
            color: var(--accent-gold);
            font-size: 14px;
            word-break: break-all;
            max-width: 200px;
        }

        .referral-count {
            font-size: 32px;
            font-weight: 700;
            color: var(--accent-gold);
            text-align: center;
            margin: 20px 0;
        }

        .referral-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .referral-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px;
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
        }

        /* Скрытые вкладки */
        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Статус сообщения */
        .status-message {
            margin-top: 16px;
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            text-align: center;
            display: none;
        }

        .status-message.success {
            display: block;
            background: rgba(0, 128, 0, 0.1);
            border: 1px solid #00ff0022;
            color: #00ff00;
        }

        .status-message.error {
            display: block;
            background: rgba(255, 0, 0, 0.1);
            border: 1px solid #ff000022;
            color: #ff6b6b;
        }

        /* Адаптивность */
        @media (max-width: 350px) {
            .cases-grid {
                grid-template-columns: 1fr;
            }
            
            .wallet-actions {
                flex-direction: column;
            }
            
            .profile-header {
                flex-direction: column;
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Хедер -->
        <header class="header">
            <div class="user-info">
                <div class="user-avatar" id="userAvatar">G</div>
                <div>
                    <div class="user-name" id="userName">Guest</div>
                    <div class="user-handle" id="userHandle">@guest</div>
                </div>
            </div>
            <div class="balance-container">
                <div class="balance-item">
                    <span class="balance-gold">✦</span>
                    <span id="balanceStars">1,250</span>
                </div>
                <div class="balance-item">
                    <span class="balance-gold">♦</span>
                    <span id="balanceNFT">3</span>
                </div>
            </div>
        </header>

        <!-- Основной контент -->
        <main class="main-content">
            <!-- TON Wallet Section (всегда видна) -->
            <div class="wallet-section">
                <div class="wallet-title">
                    <div class="wallet-icon">₿</div>
                    <div class="wallet-info">
                        <div class="wallet-label">TON Wallet</div>
                        <div class="wallet-value" id="tonBalance">0.00 <small>TON</small></div>
                    </div>
                </div>
                
                <div id="walletDisconnected">
                    <button class="wallet-button primary" id="connectWalletBtn" onclick="connectWallet()">
                        CONNECT WALLET
                    </button>
                </div>
                
                <div id="walletConnected" style="display: none;">
                    <div class="wallet-address">
                        <span class="address-text" id="walletAddress">EQD...XXXX</span>
                        <button class="copy-button" onclick="copyAddress()">COPY</button>
                    </div>
                    <div class="wallet-actions">
                        <button class="wallet-button" onclick="disconnectWallet()">DISCONNECT</button>
                        <button class="wallet-button primary" onclick="sendTransaction()">DEPOSIT</button>
                    </div>
                </div>
                
                <div class="status-message" id="walletStatus"></div>
            </div>

            <!-- Навигация по вкладкам -->
            <div style="display: flex; gap: 16px; margin-bottom: 16px;">
                <div class="nav-item active" data-tab="cases" onclick="switchTab('cases')">
                    <span class="nav-icon">♢</span>
                    <span>CASES</span>
                </div>
                <div class="nav-item" data-tab="profile" onclick="switchTab('profile')">
                    <span class="nav-icon">♤</span>
                    <span>PROFILE</span>
                </div>
                <div class="nav-item" data-tab="referrals" onclick="switchTab('referrals')">
                    <span class="nav-icon">♧</span>
                    <span>REFS</span>
                </div>
            </div>

            <!-- Вкладка CASES -->
            <div class="tab-content active" id="casesTab">
                <div class="section-title">PREMIUM CASES</div>
                <div class="cases-grid">
                    <div class="case-card">
                        <div class="case-image">□</div>
                        <div class="case-name">BASIC</div>
                        <div class="case-price">100 ✦</div>
                        <button class="case-button" onclick="openCase('basic', 100)">OPEN</button>
                    </div>
                    <div class="case-card">
                        <div class="case-image">□</div>
                        <div class="case-name">ADVANCED</div>
                        <div class="case-price">500 ✦</div>
                        <button class="case-button" onclick="openCase('advanced', 500)">OPEN</button>
                    </div>
                    <div class="case-card">
                        <div class="case-image">□</div>
                        <div class="case-name">LEGENDARY</div>
                        <div class="case-price">1000 ✦</div>
                        <button class="case-button" onclick="openCase('legendary', 1000)">OPEN</button>
                    </div>
                </div>
            </div>

            <!-- Вкладка PROFILE -->
            <div class="tab-content" id="profileTab">
                <div class="profile-section">
                    <div class="profile-header">
                        <div class="profile-avatar-large" id="profileAvatar">G</div>
                        <div class="profile-stats">
                            <div class="stat-row">
                                <span class="stat-label">Member since</span>
                                <span class="stat-value">2024</span>
                            </div>
                            <div class="stat-row">
                                <span class="stat-label">Cases opened</span>
                                <span class="stat-value" id="casesOpened">0</span>
                            </div>
                            <div class="stat-row">
                                <span class="stat-label">NFT collected</span>
                                <span class="stat-value" id="nftCollected">0</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Вкладка REFERRALS -->
            <div class="tab-content" id="referralsTab">
                <div class="referral-section">
                    <div class="section-title">REFERRAL PROGRAM</div>
                    <div class="referral-link-box">
                        <span class="referral-link" id="refLink">prime.casino/ref/guest123</span>
                        <button class="copy-button" onclick="copyRefLink()">COPY</button>
                    </div>
                    <div class="referral-count">
                        <span id="refCount">0</span> INVITED
                    </div>
                    <div class="referral-list" id="referralList">
                        <div class="referral-item">
                            <span>No referrals yet</span>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        // ===== TELEGRAM INTEGRATION =====
        const tg = window.Telegram?.WebApp;
        let currentUser = null;
        let tonWallet = null;
        let tonConnectUI = null;
        
        // Инициализация Telegram
        if (tg) {
            tg.expand();
            tg.ready();
            tg.setHeaderColor('#0a0a0a');
            tg.setBackgroundColor('#0a0a0a');
        }

        // ===== TON CONNECT ИНИЦИАЛИЗАЦИЯ =====
        function initTonConnect() {
            try {
                tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
                    manifestUrl: 'https://raw.githubusercontent.com/ton-connect/demo-dapp-with-react-ui/main/public/tonconnect-manifest.json',
                    buttonRootId: 'ton-connect-button'
                });
                
                // Подписка на изменения подключения
                tonConnectUI.onStatusChange((wallet) => {
                    if (wallet) {
                        tonWallet = wallet;
                        showWalletConnected(wallet);
                        updateTonBalance();
                    } else {
                        tonWallet = null;
                        showWalletDisconnected();
                    }
                });
                
                // Проверяем есть ли сохраненное подключение
                setTimeout(() => {
                    if (tonConnectUI.wallet) {
                        tonWallet = tonConnectUI.wallet;
                        showWalletConnected(tonConnectUI.wallet);
                        updateTonBalance();
                    }
                }, 1000);
                
            } catch (error) {
                console.error('TON Connect init error:', error);
            }
        }

        // Подключение кошелька
        async function connectWallet() {
            try {
                if (!tonConnectUI) {
                    initTonConnect();
                }
                
                await tonConnectUI.connectWallet();
                showStatus('Wallet connected successfully', 'success');
            } catch (error) {
                console.error('Connection error:', error);
                showStatus('Failed to connect wallet', 'error');
            }
        }

        // Отключение кошелька
        async function disconnectWallet() {
            try {
                if (tonConnectUI) {
                    await tonConnectUI.disconnect();
                    tonWallet = null;
                    showWalletDisconnected();
                    showStatus('Wallet disconnected', 'success');
                }
            } catch (error) {
                console.error('Disconnect error:', error);
            }
        }

        // Отображение подключенного кошелька
        function showWalletConnected(wallet) {
            document.getElementById('walletDisconnected').style.display = 'none';
            document.getElementById('walletConnected').style.display = 'block';
            
            const address = wallet.account.address;
            const shortAddress = address.slice(0, 4) + '...' + address.slice(-4);
            document.getElementById('walletAddress').textContent = shortAddress;
            
            // Сохраняем в localStorage
            localStorage.setItem('walletConnected', 'true');
        }

        function showWalletDisconnected() {
            document.getElementById('walletDisconnected').style.display = 'block';
            document.getElementById('walletConnected').style.display = 'none';
            document.getElementById('tonBalance').innerHTML = '0.00 <small>TON</small>';
            localStorage.removeItem('walletConnected');
        }

        // Копирование адреса
        async function copyAddress() {
            if (tonWallet) {
                await navigator.clipboard.writeText(tonWallet.account.address);
                showStatus('Address copied', 'success');
            }
        }

        // Отправка транзакции (тестовая)
        async function sendTransaction() {
            if (!tonWallet) {
                showStatus('Connect wallet first', 'error');
                return;
            }
            
            showStatus('Test transaction - mainnet disabled', 'error');
        }

        // Обновление баланса TON
        async function updateTonBalance() {
            if (tonWallet) {
                // В реальном проекте здесь запрос к API
                document.getElementById('tonBalance').innerHTML = '125.50 <small>TON</small>';
            }
        }

        // ===== ПОЛЬЗОВАТЕЛЬСКИЕ ДАННЫЕ =====
        function loadUserData() {
            // Загружаем из Telegram если есть
            if (tg?.initDataUnsafe?.user) {
                const user = tg.initDataUnsafe.user;
                const firstName = user.first_name || '';
                const lastName = user.last_name || '';
                const username = user.username || `user${user.id}`;
                
                currentUser = {
                    name: `${firstName} ${lastName}`.trim() || 'Player',
                    username: username,
                    avatar: user.photo_url
                };
                
                // Обновляем UI
                document.getElementById('userName').textContent = currentUser.name;
                document.getElementById('userHandle').textContent = '@' + currentUser.username;
                
                if (currentUser.avatar) {
                    document.getElementById('userAvatar').innerHTML = 
                        `<img src="${currentUser.avatar}" style="width:48px;height:48px;border-radius:24px;object-fit:cover;">`;
                    document.getElementById('profileAvatar').innerHTML = 
                        `<img src="${currentUser.avatar}" style="width:72px;height:72px;border-radius:36px;object-fit:cover;">`;
                } else {
                    const initial = currentUser.name.charAt(0).toUpperCase();
                    document.getElementById('userAvatar').textContent = initial;
                    document.getElementById('profileAvatar').textContent = initial;
                }
                
                // Генерируем реферальную ссылку
                document.getElementById('refLink').textContent = 
                    `https://t.me/prime_casino_bot?start=${user.id}`;
            }
            
            // Загружаем баланс из localStorage
            loadBalance();
        }

        // ===== БАЛАНС =====
        let stars = 1250;
        let nftCount = 3;
        let casesOpened = 0;

        function loadBalance() {
            const saved = localStorage.getItem('prime_balance');
            if (saved) {
                const data = JSON.parse(saved);
                stars = data.stars || 1250;
                nftCount = data.nft || 3;
                casesOpened = data.cases || 0;
            }
            updateBalanceDisplay();
        }

        function updateBalanceDisplay() {
            document.getElementById('balanceStars').textContent = stars.toLocaleString();
            document.getElementById('balanceNFT').textContent = nftCount;
            document.getElementById('casesOpened').textContent = casesOpened;
            document.getElementById('nftCollected').textContent = nftCount;
        }

        function saveBalance() {
            localStorage.setItem('prime_balance', JSON.stringify({
                stars: stars,
                nft: nftCount,
                cases: casesOpened
            }));
        }

        // ===== КЕЙСЫ =====
        function openCase(type, price) {
            if (!tonWallet) {
                showStatus('Connect TON wallet first', 'error');
                return;
            }
            
            if (stars < price) {
                showStatus('Insufficient balance', 'error');
                return;
            }
            
            stars -= price;
            casesOpened++;
            nftCount++;
            
            updateBalanceDisplay();
            saveBalance();
            
            showStatus('Case opened successfully!', 'success');
        }

        // ===== РЕФЕРАЛЫ =====
        function copyRefLink() {
            const refLink = document.getElementById('refLink').textContent;
            navigator.clipboard.writeText(refLink);
            showStatus('Referral link copied', 'success');
        }

        // ===== НАВИГАЦИЯ =====
        function switchTab(tabName) {
            // Обновляем активные табы
            document.querySelectorAll('.nav-item').forEach(item => {
                item.classList.toggle('active', item.dataset.tab === tabName);
            });
            
            // Показываем нужный контент
            document.querySelectorAll('.tab-content').forEach(content => {
                content.classList.toggle('active', content.id === tabName + 'Tab');
            });
            
            // Сохраняем в sessionStorage
            sessionStorage.setItem('lastTab', tabName);
        }

        // ===== СТАТУС СООБЩЕНИЯ =====
        function showStatus(message, type) {
            const statusEl = document.getElementById('walletStatus');
            statusEl.textContent = message;
            statusEl.className = 'status-message ' + type;
            
            setTimeout(() => {
                statusEl.style.display = 'none';
            }, 3000);
        }

        // ===== ТЕЛЕГРАМ АВАТАР =====
        function getTelegramAvatar() {
            return tg?.initDataUnsafe?.user?.photo_url || null;
        }

        // ===== ИНИЦИАЛИЗАЦИЯ =====
        document.addEventListener('DOMContentLoaded', () => {
            loadUserData();
            initTonConnect();
            
            // Восстанавливаем последнюю вкладку
            const lastTab = sessionStorage.getItem('lastTab');
            if (lastTab) {
                switchTab(lastTab);
            }
            
            // Проверяем был ли подключен кошелек
            if (localStorage.getItem('walletConnected') === 'true') {
                setTimeout(() => {
                    if (!tonWallet) {
                        connectWallet();
                    }
                }, 2000);
            }
        });
    </script>
</body>
