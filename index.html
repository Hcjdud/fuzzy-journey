<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PRIME CASINO | TON × TG</title>
    <!-- TON Connect UI -->
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <!-- Telegram Web App -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        :root {
            --bg-primary: #0a0a0a;
            --bg-secondary: #111111;
            --bg-card: rgba(18, 18, 18, 0.95);
            --text-primary: #ffffff;
            --text-secondary: #888888;
            --accent-gold: #D4AF37;
            --accent-gold-light: #F5D742;
            --accent-gold-dark: #B8860B;
            --accent-gold-glow: rgba(212, 175, 55, 0.15);
            --border-color: rgba(212, 175, 55, 0.2);
            --shadow-gold: 0 0 30px var(--accent-gold-glow);
            --gradient-gold: linear-gradient(135deg, var(--accent-gold) 0%, var(--accent-gold-dark) 100%);
            --ton-blue: #0088CC;
        }

        body {
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(212, 175, 55, 0.03) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(212, 175, 55, 0.03) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        .app-container {
            max-width: 450px;
            margin: 0 auto;
            padding: 20px 16px;
            position: relative;
            z-index: 1;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Хедер */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 20px;
            background: rgba(10, 10, 10, 0.8);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            border: 1px solid var(--border-color);
            margin-bottom: 24px;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .user-avatar {
            width: 48px;
            height: 48px;
            border-radius: 24px;
            background: linear-gradient(135deg, #333, #222);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: 500;
            color: var(--accent-gold);
            border: 2px solid var(--accent-gold);
            text-transform: uppercase;
            overflow: hidden;
        }

        .user-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .user-name {
            font-weight: 600;
            font-size: 16px;
            letter-spacing: -0.02em;
        }

        .user-handle {
            font-size: 14px;
            color: var(--text-secondary);
            margin-top: 2px;
        }

        /* Баланс */
        .balance-container {
            display: flex;
            gap: 12px;
        }

        .balance-item {
            background: var(--bg-card);
            padding: 8px 16px;
            border-radius: 40px;
            border: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 6px;
            font-weight: 600;
            font-size: 14px;
        }

        .balance-gold {
            color: var(--accent-gold);
        }

        /* TON Connect кнопка */
        .ton-section {
            background: var(--bg-card);
            border-radius: 20px;
            padding: 20px;
            border: 1px solid var(--border-color);
            margin-bottom: 24px;
        }

        .ton-title {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 16px;
        }

        .ton-icon {
            width: 40px;
            height: 40px;
            background: var(--ton-blue);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            color: white;
        }

        .connect-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #0088CC, #0055A4);
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .connect-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 136, 204, 0.3);
        }

        .connect-btn.connected {
            background: linear-gradient(135deg, #2ecc71, #27ae60);
        }

        .wallet-info {
            margin-top: 16px;
            display: none;
        }

        .wallet-address {
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 14px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
            font-family: 'Courier New', monospace;
        }

        .address-text {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            max-width: 200px;
            color: var(--text-secondary);
        }

        .copy-btn {
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 12px;
            cursor: pointer;
        }

        .copy-btn:hover {
            border-color: var(--accent-gold);
            color: var(--accent-gold);
        }

        .wallet-balance {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 0;
            border-top: 1px solid var(--border-color);
        }

        .balance-label {
            color: var(--text-secondary);
        }

        .balance-value {
            font-weight: 600;
            color: var(--accent-gold);
            font-size: 18px;
        }

        .balance-value small {
            font-size: 12px;
            color: var(--text-secondary);
            font-weight: 400;
        }

        .disconnect-btn {
            width: 100%;
            padding: 12px;
            background: transparent;
            border: 1px solid #ff4444;
            border-radius: 12px;
            color: #ff4444;
            font-weight: 500;
            cursor: pointer;
            margin-top: 16px;
        }

        .disconnect-btn:hover {
            background: #ff4444;
            color: white;
        }

        /* Кейсы */
        .section-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 16px;
            color: var(--text-primary);
            text-transform: uppercase;
            border-left: 4px solid var(--accent-gold);
            padding-left: 12px;
        }

        .cases-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 24px;
        }

        .case-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 20px 12px;
            text-align: center;
            transition: all 0.4s ease;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .case-card:hover {
            transform: translateY(-8px);
            border-color: var(--accent-gold);
            box-shadow: var(--shadow-gold);
        }

        .case-image {
            width: 80px;
            height: 80px;
            margin: 0 auto 16px;
            background: linear-gradient(135deg, #222, #1a1a1a);
            border-radius: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            color: var(--accent-gold);
            border: 2px solid var(--border-color);
        }

        .case-name {
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        .case-price {
            color: var(--accent-gold);
            font-weight: 700;
            font-size: 16px;
            margin-bottom: 12px;
        }

        .case-button {
            width: 100%;
            padding: 10px;
            background: transparent;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
        }

        .case-card:hover .case-button {
            border-color: var(--accent-gold);
            color: var(--accent-gold);
        }

        /* Навигация */
        .nav-container {
            background: rgba(10, 10, 10, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border-color);
            border-radius: 40px;
            padding: 8px;
            display: flex;
            justify-content: space-around;
            margin-top: auto;
        }

        .nav-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 12px 0;
            color: var(--text-secondary);
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            border-radius: 32px;
            text-transform: uppercase;
        }

        .nav-item.active {
            color: var(--accent-gold);
            background: rgba(212, 175, 55, 0.1);
        }

        .nav-icon {
            font-size: 20px;
            margin-bottom: 4px;
        }

        /* Профиль */
        .profile-section {
            background: var(--bg-card);
            border-radius: 20px;
            padding: 24px;
            border: 1px solid var(--border-color);
        }

        .profile-header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 24px;
        }

        .profile-avatar-large {
            width: 80px;
            height: 80px;
            border-radius: 40px;
            background: linear-gradient(135deg, #333, #222);
            border: 3px solid var(--accent-gold);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            font-weight: 600;
            color: var(--accent-gold);
            overflow: hidden;
        }

        .profile-avatar-large img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .profile-info {
            flex: 1;
        }

        .profile-name {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .profile-username {
            color: var(--text-secondary);
            font-size: 14px;
            margin-bottom: 8px;
        }

        .profile-date {
            color: var(--text-secondary);
            font-size: 12px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin: 20px 0;
        }

        .stat-card {
            background: var(--bg-primary);
            padding: 16px;
            border-radius: 12px;
            text-align: center;
            border: 1px solid var(--border-color);
        }

        .stat-value {
            font-size: 24px;
            font-weight: 700;
            color: var(--accent-gold);
            margin-bottom: 4px;
        }

        .stat-label {
            color: var(--text-secondary);
            font-size: 12px;
        }

        /* Рефералы */
        .referral-section {
            background: var(--bg-card);
            border-radius: 20px;
            padding: 24px;
            border: 1px solid var(--border-color);
        }

        .referral-link-box {
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 16px;
            margin: 16px 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .referral-link {
            font-family: 'Courier New', monospace;
            color: var(--accent-gold);
            font-size: 12px;
            word-break: break-all;
            max-width: 250px;
        }

        .ref-count {
            text-align: center;
            font-size: 32px;
            font-weight: 700;
            color: var(--accent-gold);
            margin: 20px 0;
        }

        .ref-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .ref-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px;
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
        }

        .ref-username {
            color: var(--text-secondary);
        }

        .ref-reward {
            color: var(--accent-gold);
        }

        .tab-content {
            display: none;
            animation: fadeIn 0.4s ease;
        }

        .tab-content.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Хедер с данными из Telegram -->
        <header class="header">
            <div class="user-info">
                <div class="user-avatar" id="userAvatar">
                    <span id="avatarInitial">G</span>
                </div>
                <div>
                    <div class="user-name" id="userName">Загрузка...</div>
                    <div class="user-handle" id="userHandle">@loading</div>
                </div>
            </div>
            <div class="balance-container">
                <div class="balance-item">
                    <span class="balance-gold">✦</span>
                    <span id="balanceStars">1,250</span>
                </div>
                <div class="balance-item">
                    <span class="balance-gold">♦</span>
                    <span id="balanceNFT">3</span>
                </div>
            </div>
        </header>

        <!-- TON Wallet Section -->
        <div class="ton-section">
            <div class="ton-title">
                <div class="ton-icon">₿</div>
                <h3>TON Wallet</h3>
            </div>
            
            <button class="connect-btn" id="connectBtn" onclick="connectWallet()">
                <span>💎</span> Connect TON Wallet
            </button>

            <div class="wallet-info" id="walletInfo">
                <div class="wallet-address">
                    <span class="address-text" id="walletAddress">EQD...XXXX</span>
                    <button class="copy-btn" onclick="copyAddress()">COPY</button>
                </div>
                <div class="wallet-balance">
                    <span class="balance-label">Balance</span>
                    <span class="balance-value" id="tonBalance">0.00 <small>TON</small></span>
                </div>
                <button class="disconnect-btn" onclick="disconnectWallet()">DISCONNECT</button>
            </div>
        </div>

        <!-- Навигация -->
        <div style="display: flex; gap: 16px; margin-bottom: 16px;">
            <div class="nav-item active" onclick="switchTab('cases')">
                <span class="nav-icon">♢</span>
                <span>CASES</span>
            </div>
            <div class="nav-item" onclick="switchTab('profile')">
                <span class="nav-icon">♤</span>
                <span>PROFILE</span>
            </div>
            <div class="nav-item" onclick="switchTab('referrals')">
                <span class="nav-icon">♧</span>
                <span>REFS</span>
            </div>
        </div>

        <!-- CASES TAB -->
        <div class="tab-content active" id="casesTab">
            <div class="section-title">PREMIUM CASES</div>
            <div class="cases-grid">
                <div class="case-card" onclick="openCase('basic')">
                    <div class="case-image">□</div>
                    <div class="case-name">BASIC</div>
                    <div class="case-price">100 ✦</div>
                    <button class="case-button">OPEN</button>
                </div>
                <div class="case-card" onclick="openCase('advanced')">
                    <div class="case-image">□</div>
                    <div class="case-name">ADVANCED</div>
                    <div class="case-price">500 ✦</div>
                    <button class="case-button">OPEN</button>
                </div>
                <div class="case-card" onclick="openCase('legendary')">
                    <div class="case-image">□</div>
                    <div class="case-name">LEGENDARY</div>
                    <div class="case-price">1000 ✦</div>
                    <button class="case-button">OPEN</button>
                </div>
            </div>
        </div>

        <!-- PROFILE TAB -->
        <div class="tab-content" id="profileTab">
            <div class="profile-section">
                <div class="profile-header">
                    <div class="profile-avatar-large" id="profileAvatar">
                        <span id="profileInitial">G</span>
                    </div>
                    <div class="profile-info">
                        <div class="profile-name" id="profileFullName">Loading...</div>
                        <div class="profile-username" id="profileUsername">@loading</div>
                        <div class="profile-date" id="profileDate">Joined 2024</div>
                    </div>
                </div>

                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-value" id="statCases">0</div>
                        <div class="stat-label">Cases Opened</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="statNFT">0</div>
                        <div class="stat-label">NFT Collected</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- REFERRALS TAB -->
        <div class="tab-content" id="referralsTab">
            <div class="referral-section">
                <div class="section-title">REFERRAL PROGRAM</div>
                
                <div class="referral-link-box">
                    <span class="referral-link" id="refLink">prime.casino/ref/...</span>
                    <button class="copy-btn" onclick="copyRefLink()">COPY</button>
                </div>

                <div class="ref-count" id="refCount">0</div>

                <div class="ref-list" id="refList">
                    <div class="ref-item">
                        <span class="ref-username">No referrals yet</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ===== TELEGRAM ИНИЦИАЛИЗАЦИЯ =====
        const tg = window.Telegram?.WebApp;
        const BOT_TOKEN = '8795849291:AAFHxbfvKYYzWJc0N5nT-45ObHr38lDciBI';
        const BOT_USERNAME = 'YourBotUsername'; // Замените на username вашего бота
        
        let currentUser = null;
        let tonConnectUI = null;
        let tonWallet = null;

        // Инициализация Telegram
        if (tg) {
            tg.expand();
            tg.ready();
            tg.setHeaderColor('#0a0a0a');
            tg.setBackgroundColor('#0a0a0a');
            
            // Получаем данные пользователя
            if (tg.initDataUnsafe?.user) {
                const user = tg.initDataUnsafe.user;
                currentUser = {
                    id: user.id,
                    firstName: user.first_name || '',
                    lastName: user.last_name || '',
                    username: user.username || `user${user.id}`,
                    photoUrl: user.photo_url,
                    languageCode: user.language_code
                };
                
                // Обновляем интерфейс
                updateUserInfo();
                
                // Генерируем реферальную ссылку
                const refLink = `https://t.me/${BOT_USERNAME}?start=ref${user.id}`;
                document.getElementById('refLink').textContent = refLink;
                
                // Загружаем данные пользователя из localStorage
                loadUserData();
            }
        }

        // Обновление интерфейса с данными пользователя
        function updateUserInfo() {
            if (!currentUser) return;
            
            const fullName = `${currentUser.firstName} ${currentUser.lastName}`.trim() || 'Player';
            
            // Основной хедер
            document.getElementById('userName').textContent = fullName;
            document.getElementById('userHandle').textContent = '@' + currentUser.username;
            
            // Профиль
            document.getElementById('profileFullName').textContent = fullName;
            document.getElementById('profileUsername').textContent = '@' + currentUser.username;
            
            // Аватар
            const initial = (currentUser.firstName?.[0] || 'U').toUpperCase();
            
            if (currentUser.photoUrl) {
                document.getElementById('userAvatar').innerHTML = `<img src="${currentUser.photoUrl}" alt="avatar">`;
                document.getElementById('profileAvatar').innerHTML = `<img src="${currentUser.photoUrl}" alt="avatar">`;
            } else {
                document.getElementById('avatarInitial').textContent = initial;
                document.getElementById('profileInitial').textContent = initial;
            }
        }

        // ===== TON CONNECT ИНИЦИАЛИЗАЦИЯ =====
        function initTonConnect() {
            try {
                tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
                    manifestUrl: 'https://raw.githubusercontent.com/ton-connect/demo-dapp-with-react-ui/main/public/tonconnect-manifest.json',
                    buttonRootId: 'ton-connect-button'
                });
                
                tonConnectUI.onStatusChange((wallet) => {
                    if (wallet) {
                        tonWallet = wallet;
                        showWalletConnected(wallet);
                        updateTonBalance();
                    } else {
                        tonWallet = null;
                        showWalletDisconnected();
                    }
                });
            } catch (error) {
                console.error('TON Connect init error:', error);
            }
        }

        // Подключение кошелька
        async function connectWallet() {
            try {
                if (!tonConnectUI) {
                    initTonConnect();
                    setTimeout(() => tonConnectUI?.connectWallet(), 500);
                } else {
                    await tonConnectUI.connectWallet();
                }
            } catch (error) {
                console.error('Connection error:', error);
            }
        }

        // Отключение кошелька
        async function disconnectWallet() {
            try {
                if (tonConnectUI) {
                    await tonConnectUI.disconnect();
                }
            } catch (error) {
                console.error('Disconnect error:', error);
            }
        }

        // Показать информацию о подключенном кошельке
        function showWalletConnected(wallet) {
            document.getElementById('connectBtn').style.display = 'none';
            document.getElementById('walletInfo').style.display = 'block';
            
            const address = wallet.account.address;
            const shortAddress = address.slice(0, 4) + '...' + address.slice(-4);
            document.getElementById('walletAddress').querySelector('.address-text').textContent = shortAddress;
        }

        function showWalletDisconnected() {
            document.getElementById('connectBtn').style.display = 'block';
            document.getElementById('walletInfo').style.display = 'none';
            document.getElementById('tonBalance').innerHTML = '0.00 <small>TON</small>';
        }

        // Копирование адреса
        async function copyAddress() {
            if (tonWallet) {
                await navigator.clipboard.writeText(tonWallet.account.address);
            }
        }

        // Копирование реферальной ссылки
        function copyRefLink() {
            const refLink = document.getElementById('refLink').textContent;
            navigator.clipboard.writeText(refLink);
        }

        // Обновление баланса TON
        async function updateTonBalance() {
            // Здесь должен быть запрос к API для получения реального баланса
            document.getElementById('tonBalance').innerHTML = '125.50 <small>TON</small>';
        }

        // ===== ИГРОВАЯ ЛОГИКА =====
        let stars = 1250;
        let nftCount = 3;
        let casesOpened = 0;
        let referrals = [];

        function loadUserData() {
            const saved = localStorage.getItem(`prime_${currentUser.id}`);
            if (saved) {
                const data = JSON.parse(saved);
                stars = data.stars || 1250;
                nftCount = data.nft || 3;
                casesOpened = data.cases || 0;
                referrals = data.referrals || [];
            }
            updateBalances();
            updateReferrals();
        }

        function saveUserData() {
            if (currentUser) {
                localStorage.setItem(`prime_${currentUser.id}`, JSON.stringify({
                    stars,
                    nft: nftCount,
                    cases: casesOpened,
                    referrals
                }));
            }
        }

        function updateBalances() {
            document.getElementById('balanceStars').textContent = stars.toLocaleString();
            document.getElementById('balanceNFT').textContent = nftCount;
            document.getElementById('statCases').textContent = casesOpened;
            document.getElementById('statNFT').textContent = nftCount;
        }

        function updateReferrals() {
            document.getElementById('refCount').textContent = referrals.length;
            
            const refList = document.getElementById('refList');
            if (referrals.length > 0) {
                refList.innerHTML = referrals.map(ref => `
                    <div class="ref-item">
                        <span class="ref-username">@${ref.username}</span>
                        <span class="ref-reward">+100 ✦</span>
                    </div>
                `).join('');
            } else {
                refList.innerHTML = '<div class="ref-item"><span class="ref-username">No referrals yet</span></div>';
            }
        }

        function openCase(type) {
            if (!tonWallet) {
                alert('Connect TON wallet first');
                return;
            }
            
            let price = 0;
            switch(type) {
                case 'basic': price = 100; break;
                case 'advanced': price = 500; break;
                case 'legendary': price = 1000; break;
            }
            
            if (stars < price) {
                alert('Insufficient balance');
                return;
            }
            
            stars -= price;
            casesOpened++;
            nftCount++;
            
            updateBalances();
            saveUserData();
            
            // Анимация открытия
            const cards = document.querySelectorAll('.case-card');
            cards.forEach(card => card.style.animation = 'none');
            setTimeout(() => {
                cards.forEach(card => card.style.animation = '');
            }, 10);
        }

        // ===== НАВИГАЦИЯ =====
        function switchTab(tabName) {
            document.querySelectorAll('.nav-item').forEach(item => {
                item.classList.remove('active');
            });
            event.currentTarget.classList.add('active');
            
            document.querySelectorAll('.tab-content').forEach(content => {
                content.classList.remove('active');
            });
            document.getElementById(tabName + 'Tab').classList.add('active');
        }

        // Инициализация при загрузке
        document.addEventListener('DOMContentLoaded', () => {
            initTonConnect();
            
            // Проверяем параметры реферала из URL
            const urlParams = new URLSearchParams(window.location.search);
            const startParam = urlParams.get('tgWebAppStartParam');
            if (startParam && startParam.startsWith('ref')) {
                const referrerId = startParam.replace('ref', '');
                // Здесь логика обработки реферала
                console.log('Referred by:', referrerId);
            }
        });
    </script>
</body>
</html>
