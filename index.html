<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MOONYDROP | TON CASINO</title>
    <!-- TON Connect UI -->
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <!-- Telegram Web App -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        :root {
            --bg-primary: #0a0a0a;
            --bg-secondary: #111111;
            --bg-card: rgba(18, 18, 18, 0.95);
            --text-primary: #ffffff;
            --text-secondary: #888888;
            --accent-gold: #D4AF37;
            --accent-gold-glow: rgba(212, 175, 55, 0.2);
            --border-color: rgba(212, 175, 55, 0.15);
            --gradient-gold: linear-gradient(135deg, #D4AF37 0%, #B8860B 100%);
            --ton-blue: #0088CC;
        }

        body {
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            position: relative;
            padding: 16px;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: radial-gradient(circle at 20% 30%, rgba(212, 175, 55, 0.05) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        .app {
            max-width: 450px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        /* Хедер */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px;
            background: rgba(10, 10, 10, 0.8);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 1px solid var(--border-color);
            margin-bottom: 16px;
        }

        .user {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .avatar {
            width: 48px;
            height: 48px;
            border-radius: 24px;
            background: linear-gradient(135deg, #333, #222);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: 600;
            color: var(--accent-gold);
            border: 2px solid var(--accent-gold);
            overflow: hidden;
        }

        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .user-info h3 {
            font-size: 16px;
            font-weight: 600;
        }

        .user-info p {
            font-size: 14px;
            color: var(--text-secondary);
            margin-top: 2px;
        }

        .balance {
            display: flex;
            gap: 8px;
        }

        .balance-item {
            background: var(--bg-card);
            padding: 8px 12px;
            border-radius: 30px;
            border: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 4px;
            font-weight: 600;
            font-size: 14px;
        }

        .gold {
            color: var(--accent-gold);
        }

        /* TON секция */
        .ton-section {
            background: var(--bg-card);
            border-radius: 20px;
            padding: 20px;
            border: 1px solid var(--border-color);
            margin-bottom: 20px;
        }

        .ton-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
        }

        .ton-icon {
            width: 40px;
            height: 40px;
            background: var(--ton-blue);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 20px;
            color: white;
        }

        .ton-header h3 {
            font-size: 18px;
            font-weight: 600;
        }

        /* TON Connect кнопка */
        .ton-connect-button {
            margin-bottom: 16px;
        }

        #ton-connect {
            width: 100%;
        }

        /* Информация о кошельке */
        .wallet-info {
            display: none;
            margin-top: 16px;
        }

        .wallet-address {
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
            font-family: monospace;
        }

        .address {
            color: var(--text-secondary);
            font-size: 14px;
        }

        .copy-btn {
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            padding: 4px 12px;
            border-radius: 8px;
            font-size: 12px;
            cursor: pointer;
        }

        .copy-btn:hover {
            border-color: var(--accent-gold);
            color: var(--accent-gold);
        }

        .balance-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 0;
            border-top: 1px solid var(--border-color);
        }

        .balance-label {
            color: var(--text-secondary);
        }

        .balance-value {
            font-weight: 600;
            color: var(--accent-gold);
            font-size: 18px;
        }

        .disconnect-btn {
            width: 100%;
            padding: 12px;
            background: transparent;
            border: 1px solid #ff4444;
            border-radius: 12px;
            color: #ff4444;
            font-weight: 500;
            cursor: pointer;
            margin-top: 16px;
        }

        .disconnect-btn:hover {
            background: #ff4444;
            color: white;
        }

        /* Навигация */
        .nav {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
        }

        .nav-item {
            flex: 1;
            padding: 12px;
            text-align: center;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            color: var(--text-secondary);
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .nav-item.active {
            background: var(--gradient-gold);
            color: #000;
            border-color: var(--accent-gold);
        }

        /* Кейсы */
        .cases-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }

        .case {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 16px 12px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .case:hover {
            transform: translateY(-4px);
            border-color: var(--accent-gold);
        }

        .case-icon {
            width: 60px;
            height: 60px;
            margin: 0 auto 12px;
            background: linear-gradient(135deg, #222, #1a1a1a);
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            color: var(--accent-gold);
        }

        .case h4 {
            font-size: 14px;
            margin-bottom: 8px;
        }

        .case-price {
            color: var(--accent-gold);
            font-weight: 600;
            font-size: 16px;
            margin-bottom: 12px;
        }

        .case-btn {
            width: 100%;
            padding: 8px;
            background: transparent;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-primary);
            cursor: pointer;
        }

        .case:hover .case-btn {
            border-color: var(--accent-gold);
            color: var(--accent-gold);
        }

        /* Профиль */
        .profile {
            background: var(--bg-card);
            border-radius: 20px;
            padding: 20px;
            border: 1px solid var(--border-color);
        }

        .profile-header {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 20px;
        }

        .profile-avatar {
            width: 70px;
            height: 70px;
            border-radius: 35px;
            background: linear-gradient(135deg, #333, #222);
            border: 3px solid var(--accent-gold);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: 600;
            color: var(--accent-gold);
            overflow: hidden;
        }

        .profile-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 16px;
        }

        .stat {
            background: var(--bg-primary);
            padding: 16px;
            border-radius: 12px;
            text-align: center;
        }

        .stat-value {
            font-size: 24px;
            font-weight: 700;
            color: var(--accent-gold);
            margin-bottom: 4px;
        }

        .stat-label {
            color: var(--text-secondary);
            font-size: 12px;
        }

        /* Рефералы */
        .referrals {
            background: var(--bg-card);
            border-radius: 20px;
            padding: 20px;
            border: 1px solid var(--border-color);
        }

        .ref-link {
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 12px;
            margin: 16px 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .ref-link span {
            font-family: monospace;
            color: var(--accent-gold);
            font-size: 12px;
            word-break: break-all;
            max-width: 250px;
        }

        .ref-count {
            text-align: center;
            font-size: 32px;
            font-weight: 700;
            color: var(--accent-gold);
            margin: 16px 0;
        }

        .ref-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .ref-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px;
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
        }

        .tab {
            display: none;
        }

        .tab.active {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Статус сообщения */
        .status {
            margin-top: 12px;
            padding: 10px;
            border-radius: 8px;
            text-align: center;
            display: none;
        }

        .status.success {
            background: rgba(46, 204, 113, 0.1);
            border: 1px solid #2ecc71;
            color: #2ecc71;
            display: block;
        }

        .status.error {
            background: rgba(255, 68, 68, 0.1);
            border: 1px solid #ff4444;
            color: #ff4444;
            display: block;
        }
    </style>
</head>
<body>
    <div class="app">
        <!-- Хедер -->
        <div class="header">
            <div class="user">
                <div class="avatar" id="avatar">
                    <span id="avatarInitial">?</span>
                </div>
                <div class="user-info">
                    <h3 id="userName">Loading...</h3>
                    <p id="userHandle">@loading</p>
                </div>
            </div>
            <div class="balance">
                <div class="balance-item">
                    <span class="gold">✦</span>
                    <span id="balanceStars">1,250</span>
                </div>
                <div class="balance-item">
                    <span class="gold">♦</span>
                    <span id="balanceNFT">3</span>
                </div>
            </div>
        </div>

        <!-- TON Wallet -->
        <div class="ton-section">
            <div class="ton-header">
                <div class="ton-icon">₿</div>
                <h3>TON Wallet</h3>
            </div>

            <div id="ton-connect"></div>

            <div class="wallet-info" id="walletInfo">
                <div class="wallet-address">
                    <span class="address" id="walletAddress">EQD...XXXX</span>
                    <button class="copy-btn" onclick="copyAddress()">COPY</button>
                </div>
                <div class="balance-row">
                    <span class="balance-label">Balance</span>
                    <span class="balance-value" id="tonBalance">0.00 <small>TON</small></span>
                </div>
                <button class="disconnect-btn" onclick="disconnectWallet()">DISCONNECT</button>
            </div>
        </div>

        <!-- Навигация -->
        <div class="nav">
            <div class="nav-item active" onclick="switchTab('cases')">CASES</div>
            <div class="nav-item" onclick="switchTab('profile')">PROFILE</div>
            <div class="nav-item" onclick="switchTab('referrals')">REFS</div>
        </div>

        <!-- CASES TAB -->
        <div class="tab active" id="casesTab">
            <div class="cases-grid">
                <div class="case" onclick="openCase('basic')">
                    <div class="case-icon">□</div>
                    <h4>BASIC</h4>
                    <div class="case-price">100 ✦</div>
                    <button class="case-btn">OPEN</button>
                </div>
                <div class="case" onclick="openCase('advanced')">
                    <div class="case-icon">□</div>
                    <h4>ADVANCED</h4>
                    <div class="case-price">500 ✦</div>
                    <button class="case-btn">OPEN</button>
                </div>
                <div class="case" onclick="openCase('legendary')">
                    <div class="case-icon">□</div>
                    <h4>LEGENDARY</h4>
                    <div class="case-price">1000 ✦</div>
                    <button class="case-btn">OPEN</button>
                </div>
            </div>
        </div>

        <!-- PROFILE TAB -->
        <div class="tab" id="profileTab">
            <div class="profile">
                <div class="profile-header">
                    <div class="profile-avatar" id="profileAvatar">
                        <span id="profileInitial">?</span>
                    </div>
                    <div>
                        <h2 id="profileName">Loading...</h2>
                        <p id="profileUsername">@loading</p>
                        <p style="color: var(--text-secondary); font-size: 12px;" id="profileDate">Joined 2024</p>
                    </div>
                </div>

                <div class="stats">
                    <div class="stat">
                        <div class="stat-value" id="statCases">0</div>
                        <div class="stat-label">Cases</div>
                    </div>
                    <div class="stat">
                        <div class="stat-value" id="statNFT">0</div>
                        <div class="stat-label">NFT</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- REFERRALS TAB -->
        <div class="tab" id="referralsTab">
            <div class="referrals">
                <h3 style="margin-bottom: 16px;">REFERRAL PROGRAM</h3>
                
                <div class="ref-link">
                    <span id="refLink">t.me/MoonyDrop_bot?start=ref</span>
                    <button class="copy-btn" onclick="copyRefLink()">COPY</button>
                </div>

                <div class="ref-count" id="refCount">0</div>

                <div class="ref-list" id="refList">
                    <div class="ref-item">No referrals yet</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ===== TELEGRAM INTEGRATION =====
        const tg = window.Telegram?.WebApp;
        const BOT_USERNAME = 'MoonyDrop_bot';
        
        let currentUser = null;
        let tonConnectUI = null;
        let walletInfo = null;

        // Инициализация Telegram
        if (tg) {
            tg.expand();
            tg.ready();
            
            if (tg.initDataUnsafe?.user) {
                const user = tg.initDataUnsafe.user;
                currentUser = {
                    id: user.id,
                    firstName: user.first_name || '',
                    lastName: user.last_name || '',
                    username: user.username || `user${user.id}`,
                    photoUrl: user.photo_url
                };
                
                // Обновляем интерфейс
                updateUserInfo();
                
                // Генерируем реферальную ссылку
                document.getElementById('refLink').innerHTML = `t.me/${BOT_USERNAME}?start=ref${user.id}`;
                
                // Загружаем данные
                loadUserData();
            }
        }

        function updateUserInfo() {
            if (!currentUser) return;
            
            const fullName = `${currentUser.firstName} ${currentUser.lastName}`.trim() || 'Player';
            const initial = (currentUser.firstName?.[0] || 'U').toUpperCase();
            
            document.getElementById('userName').textContent = fullName;
            document.getElementById('userHandle').textContent = '@' + currentUser.username;
            document.getElementById('profileName').textContent = fullName;
            document.getElementById('profileUsername').textContent = '@' + currentUser.username;
            
            if (currentUser.photoUrl) {
                document.getElementById('avatar').innerHTML = `<img src="${currentUser.photoUrl}" alt="avatar">`;
                document.getElementById('profileAvatar').innerHTML = `<img src="${currentUser.photoUrl}" alt="avatar">`;
            } else {
                document.getElementById('avatarInitial').textContent = initial;
                document.getElementById('profileInitial').textContent = initial;
            }
        }

        // ===== TON CONNECT =====
        function initTonConnect() {
            try {
                tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
                    manifestUrl: 'https://raw.githubusercontent.com/ton-connect/demo-dapp-with-react-ui/main/public/tonconnect-manifest.json',
                    buttonRootId: 'ton-connect'
                });
                
                // Подписка на изменения
                tonConnectUI.onStatusChange((wallet) => {
                    if (wallet) {
                        walletInfo = wallet;
                        showWalletConnected(wallet);
                        showStatus('Wallet connected!', 'success');
                    } else {
                        walletInfo = null;
                        showWalletDisconnected();
                    }
                });
                
                // Проверяем есть ли уже подключенный кошелек
                setTimeout(() => {
                    if (tonConnectUI.wallet) {
                        walletInfo = tonConnectUI.wallet;
                        showWalletConnected(tonConnectUI.wallet);
                    }
                }, 1000);
                
            } catch (error) {
                console.error('TON Connect error:', error);
            }
        }

        function showWalletConnected(wallet) {
            document.getElementById('ton-connect').style.display = 'none';
            document.getElementById('walletInfo').style.display = 'block';
            
            const address = wallet.account.address;
            const shortAddress = address.slice(0, 4) + '...' + address.slice(-4);
            document.getElementById('walletAddress').textContent = shortAddress;
            
            // Здесь должен быть запрос к API для получения баланса
            document.getElementById('tonBalance').innerHTML = '0.00 <small>TON</small>';
        }

        function showWalletDisconnected() {
            document.getElementById('ton-connect').style.display = 'block';
            document.getElementById('walletInfo').style.display = 'none';
        }

        function disconnectWallet() {
            if (tonConnectUI) {
                tonConnectUI.disconnect();
            }
        }

        async function copyAddress() {
            if (walletInfo) {
                await navigator.clipboard.writeText(walletInfo.account.address);
                showStatus('Address copied!', 'success');
            }
        }

        function copyRefLink() {
            const refLink = document.getElementById('refLink').textContent;
            navigator.clipboard.writeText(refLink);
            showStatus('Link copied!', 'success');
        }

        function showStatus(message, type) {
            // Простая замена статуса через alert для простоты
            alert(message);
        }

        // ===== ИГРОВАЯ ЛОГИКА =====
        let stars = 1250;
        let nftCount = 3;
        let casesOpened = 0;
        let referrals = [];

        function loadUserData() {
            if (!currentUser) return;
            
            const saved = localStorage.getItem(`moonydrop_${currentUser.id}`);
            if (saved) {
                const data = JSON.parse(saved);
                stars = data.stars || 1250;
                nftCount = data.nft || 3;
                casesOpened = data.cases || 0;
                referrals = data.referrals || [];
            }
            updateStats();
        }

        function saveUserData() {
            if (currentUser) {
                localStorage.setItem(`moonydrop_${currentUser.id}`, JSON.stringify({
                    stars,
                    nft: nftCount,
                    cases: casesOpened,
                    referrals
                }));
            }
        }

        function updateStats() {
            document.getElementById('balanceStars').textContent = stars.toLocaleString();
            document.getElementById('balanceNFT').textContent = nftCount;
            document.getElementById('statCases').textContent = casesOpened;
            document.getElementById('statNFT').textContent = nftCount;
            document.getElementById('refCount').textContent = referrals.length;
            
            if (referrals.length > 0) {
                const refList = document.getElementById('refList');
                refList.innerHTML = referrals.map(ref => 
                    `<div class="ref-item">@${ref.username} <span class="gold">+100✦</span></div>`
                ).join('');
            }
        }

        function openCase(type) {
            if (!walletInfo) {
                alert('Connect TON wallet first!');
                return;
            }
            
            let price = 0;
            switch(type) {
                case 'basic': price = 100; break;
                case 'advanced': price = 500; break;
                case 'legendary': price = 1000; break;
            }
            
            if (stars < price) {
                alert('Not enough stars!');
                return;
            }
            
            stars -= price;
            casesOpened++;
            nftCount++;
            
            updateStats();
            saveUserData();
        }

        // ===== НАВИГАЦИЯ =====
        function switchTab(tab) {
            document.querySelectorAll('.nav-item').forEach(item => {
                item.classList.remove('active');
            });
            event.target.classList.add('active');
            
            document.querySelectorAll('.tab').forEach(t => {
                t.classList.remove('active');
            });
            document.getElementById(tab + 'Tab').classList.add('active');
        }

        // Инициализация
        document.addEventListener('DOMContentLoaded', () => {
            initTonConnect();
        });
    </script>
</body>
</html>
